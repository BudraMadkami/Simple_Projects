<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budra Madkami | Portfolio</title>

<style>
/* Reset & Global Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  height: 100vh;
  background: #0f2027;
  color: white;
  overflow: hidden; /* Keeps it a clean one-page look */
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  position: absolute;
  width: 100%;
  z-index: 10;
}

nav h2 {
  color: #ffb347;
  letter-spacing: 1px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
  font-size: 14px;
  transition: 0.3s;
}

nav a:hover {
  color: #ffb347;
}

/* HERO SECTION */
.hero {
  display: flex;
  align-items: center;
  height: 100vh; /* Full screen height */
  padding-left: 80px;
  /* UPDATED IMAGE URL & OVERLAY */
  background: linear-gradient(
    to right,
    rgba(15, 32, 39, 0.9), 
    rgba(15, 32, 39, 0.4)
  ),
  url("https://images.unsplash.com");
  background-size: cover;
  background-position: center;
}

.hero-content {
  max-width: 600px;
}

.hero h1 {
  font-size: 64px;
  color: #ffb347;
  margin-bottom: 5px;
  line-height: 1.1;
}

.hero h3 {
  font-weight: 300;
  font-size: 24px;
  margin-bottom: 25px;
  color: #e0e0e0;
}

.hero p {
  line-height: 1.8;
  color: #cccccc;
  font-size: 17px;
}

/* BUTTON */
button {
  margin-top: 35px;
  padding: 14px 35px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(45deg, #ff7e5f, #ffb347);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(255, 126, 95, 0.3);
}

/* Responsive for Mobile */
@media (max-width: 768px) {
  nav { padding: 20px; }
  .hero { padding-left: 20px; text-align: center; justify-content: center; }
  .hero h1 { font-size: 40px; }
}
</style>
</head>

<body>

<nav>
  <h2>BUDRA.</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Skills</a>
    <a href="#">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Budra Madkami</h1>
    <h3>Programming Learner</h3>
    <p>
      Hello! I’m a student passionate about technology. I love building logic and exploring 
      <strong>Python</strong>, <strong>JavaScript</strong>, and <strong>C++</strong>. 
      I am continuously improving my skills and building projects to solve real-world problems.
    </p>
    <button onclick="alert('Redirecting to projects...')">View My Projects</button>
  </div>
</section>

</body>
</html>
