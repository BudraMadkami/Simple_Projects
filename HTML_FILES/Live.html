<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Budra Madkami</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:#0b0f1a;
color:white;
}

/* animated stars */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:move 60s linear infinite;
opacity:0.4;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* navbar */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:25px 60px;
z-index:10;
}

nav h2{
color:#00e5ff;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
}

/* hero section */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
}

/* text section */

.text{
max-width:500px;
}

.text h1{
font-size:60px;
color:#00e5ff;
margin-bottom:10px;
}

.text h3{
margin-bottom:20px;
font-weight:normal;
color:#ccc;
}

.text p{
line-height:1.6;
color:#ddd;
}

/* button */

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00e5ff,#0099ff);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 15px rgba(0,229,255,0.6);
}

button:hover{
transform:scale(1.05);
}

/* profile image */

.image img{
width:380px;
border-radius:10px;
box-shadow:0 0 40px rgba(0,229,255,0.4);
}

</style>
</head>

<body>

<nav>
<h2>Budra</h2>

<div>
<a href="#">Home</a>
<a href="#">Projects</a>
<a href="#">Skills</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">

<div class="text">

<h1>Budra Madkami</h1>

<h3>Programming Learner</h3>

<p>
Hello! I’m Budra Madkami, a student passionate about learning programming and technology.
I enjoy building small projects and exploring languages such as Python, JavaScript,
C++, and web development.
</p>

<button>Explore My Work</button>

</div>

<div class="image">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
</div>

</section>

</body>
</html>
